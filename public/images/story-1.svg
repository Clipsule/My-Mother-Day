<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="photo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBDCD6;stop-opacity:1" />
    </linearGradient>
    <filter id="soft1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#photo1)"/>
  <ellipse cx="300" cy="180" rx="100" ry="100" fill="#E88884" opacity="0.2" filter="url(#soft1)"/>
  <ellipse cx="200" cy="280" rx="60" ry="60" fill="#D4706A" opacity="0.15" filter="url(#soft1)"/>
  <text x="300" y="360" font-family="Noto Serif SC, serif" font-size="18" fill="#5A5148" text-anchor="middle" opacity="0.6">宝宝的第一个微笑</text>
