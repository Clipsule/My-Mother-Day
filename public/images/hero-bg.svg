<svg width="800" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7EC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFE8E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBDCD6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="softLight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="warmGlow" cx="70%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#E88884;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E88884;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#warmBg)"/>
  <rect width="100%" height="100%" fill="url(#softLight)"/>
  <rect width="100%" height="100%" fill="url(#warmGlow)"/>
  
  <ellipse cx="200" cy="300" rx="150" ry="150" fill="#E88884" opacity="0.15" filter="blur(60px)"/>
  <ellipse cx="600" cy="800" rx="200" ry="200" fill="#D4706A" opacity="0.1" filter="blur(80px)"/>
  
  <circle cx="400" cy="400" r="120" fill="none" stroke="#E88884" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="400" r="180" fill="none" stroke="#E88884" stroke-width="0.5" opacity="0.1"/>
</svg>