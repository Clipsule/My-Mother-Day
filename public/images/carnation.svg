<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E88884"/>
      <stop offset="100%" style="stop-color:#D4706A"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB87C"/>
      <stop offset="100%" style="stop-color:#5A9A5A"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E88884" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect x="95" y="100" width="10" height="90" fill="url(#stemGrad)" rx="5"/>
  
  <ellipse cx="75" cy="130" rx="20" ry="6" fill="#7CB87C" opacity="0.8" transform="rotate(-35, 75, 130)"/>
  <ellipse cx="125" cy="150" rx="18" ry="5" fill="#7CB87C" opacity="0.8" transform="rotate(35, 125, 150)"/>
  
  <g filter="url(#softShadow)">
    <ellipse cx="100" cy="65" rx="28" ry="18" fill="url(#petalGrad)" transform="rotate(0, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="28" ry="18" fill="url(#petalGrad)" transform="rotate(45, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="28" ry="18" fill="url(#petalGrad)" transform="rotate(90, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="28" ry="18" fill="url(#petalGrad)" transform="rotate(135, 100, 65)"/>
    
    <ellipse cx="100" cy="65" rx="20" ry="12" fill="#D4706A" transform="rotate(22, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="20" ry="12" fill="#D4706A" transform="rotate(67, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="20" ry="12" fill="#D4706A" transform="rotate(112, 100, 65)"/>
    <ellipse cx="100" cy="65" rx="20" ry="12" fill="#D4706A" transform="rotate(157, 100, 65)"/>
    
    <ellipse cx="100" cy="65" rx="12" ry="8" fill="#C4605A"/>
  </g>
</svg>